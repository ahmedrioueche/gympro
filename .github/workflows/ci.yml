name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:
    secrets:
      NPM_TOKEN:
        required: true

env:
  NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

jobs:
  lint-test-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # Backend
      - name: Install backend dependencies
        run: npm install
        working-directory: backend

      - name: Lint backend
        run: npm run lint
        working-directory: backend

      - name: Test backend
        run: npm test
        working-directory: backend

      - name: Build backend
        run: npm run build
        working-directory: backend

      # Web
      - name: Install web dependencies
        run: npm install
        working-directory: web

      - name: Lint web
        run: npm run lint
        working-directory: web

      - name: Build web
        run: npm run build
        working-directory: web
